name: Oil News Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-news-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # --- RESTORE STATE FROM CACHE (replaces git commit strategy) ---
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: oil-state-${{ github.run_id }}
          restore-keys: |
            oil-state-

      - name: Run script
        run: python monitor.py

      # --- SAVE STATE TO CACHE (no more git push conflicts) ---
      - name: Save state cache
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: oil-state-${{ github.run_id }}
